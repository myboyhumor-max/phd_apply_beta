kind = "web"
previewPath = "/"
title = "PhD Application Tracker"
version = "1.0.0"
id = "artifacts/phd-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24590

[services.development]
run = "pnpm --filter @workspace/phd-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phd-tracker", "run", "build" ]
publicDir = "artifacts/phd-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24590"
BASE_PATH = "/"
